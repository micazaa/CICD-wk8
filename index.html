<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud CI/CD Demo</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #8a8a8a, #fdfdfd);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: rgb(0, 0, 0);
        }

        .card {
            background: rgba(241, 238, 238, 0.67);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            width: 350px;
        }

        .profile {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            background: white;
        }

        .profile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            font-size: 17px;
            margin: 8px 0;
        }

        .footer {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.9;
        }

        code {
            background: rgba(255,255,255,0.2);
            padding: 3px 8px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="profile">
        <img src="img.jpg" alt="Profile Picture">
    </div>

    <h1>Hi from Mica!</h1>

    <p>Welcome to my CI/CD Demo Project.</p>

    <p>
        This website is automatically deployed using
        <strong>GitHub Actions</strong>.
    </p>

    <div class="footer">
        🚀 Continuous Integration & Continuous Deployment
        <br><br>
        Repository: <code>CICD-wk8</code>
    </div>

</div>

</body>
</html>
